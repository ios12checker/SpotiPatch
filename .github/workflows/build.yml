name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Build WPF Application
      run: |
        dotnet publish Source/SpotiPatch-Installer/SpotiPatch-Installer.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish

    - name: Copy release files
      run: |
        Copy-Item Source/SpotiPatch-Installer.ps1 publish/
        Copy-Item Source/Release-README.txt publish/README.txt
        Copy-Item CHANGELOG.md publish/
        Copy-Item LICENSE publish/

    - name: Create Release Archive
      run: |
        Compress-Archive -Path publish/* -DestinationPath SpotiPatch-Installer-${{ github.ref_name }}.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SpotiPatch-Installer
        path: SpotiPatch-Installer-${{ github.ref_name }}.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: SpotiPatch-Installer-${{ github.ref_name }}.zip
        draft: true
        generate_release_notes: true
